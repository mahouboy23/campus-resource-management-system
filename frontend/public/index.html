<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In / Sign Up</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- Sign In Form -->
        <form id="signInForm">
            <h2>Sign In</h2>
            <div class="form-group">
                <label for="signin-email">Email</label>
                <input type="email" id="signin-email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label for="signin-password">Password</label>
                <input type="password" id="signin-password" placeholder="Enter your password" required />
            </div>
            <div class="form-group">
                <label for="signin-role">Role</label>
                <select id="signin-role" required>
                    <option value="" disabled selected>Select role</option>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit">Log In</button>
            <a href="#" class="toggle-link" id="showSignUp">Don't have an account? Sign Up</a>
        </form>

        <!-- Sign Up Form (hidden by default) -->
        <form id="signUpForm" style="display:none;">
            <h2>Sign Up</h2>
            <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" placeholder="Enter your password" required />
            </div>
            <div class="form-group">
                <label for="signup-password2">Confirm Password</label>
                <input type="password" id="signup-password2" placeholder="Confirm your password" required />
            </div>
            <button type="submit">Create Account</button>
            <a href="#" class="toggle-link" id="showSignIn">Already have an account? Sign In</a>
        </form>
    </div>

    <script>
        const signInForm = document.getElementById("signInForm");
        const signUpForm = document.getElementById("signUpForm");
        const showSignUp = document.getElementById("showSignUp");
        const showSignIn = document.getElementById("showSignIn");

        showSignUp.addEventListener("click", (e) => {
        e.preventDefault();
        signInForm.style.display = "none";
        signUpForm.style.display = "block";
        });

        showSignIn.addEventListener("click", (e) => {
        e.preventDefault();
        signUpForm.style.display = "none";
        signInForm.style.display = "block";
        });
    </script>
</body>
</html>
